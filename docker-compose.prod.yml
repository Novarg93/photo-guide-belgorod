services:
  app:
    image: ghcr.io/novarg93/photo-guide-belgorod:latest
    restart: unless-stopped
    env_file: [.env]
    depends_on:
      - db
      - redis

  queue:
    image: ghcr.io/novarg93/photo-guide-belgorod:latest
    restart: unless-stopped
    env_file: [.env]
    depends_on:
      - db
      - redis
    command: php artisan queue:work --sleep=1 --tries=3 --timeout=90

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: photo_guide
      MYSQL_USER: photo
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - dbdata:/var/lib/mysql

  redis:
    image: redis:alpine
    restart: unless-stopped

volumes:
  dbdata: